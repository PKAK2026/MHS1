<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="container mt-5 mb-5">
    <div class="card p-4">
      <h3 class="mb-4 text-primary">ระบบบันทึก ขอรื้อถอนที่ราชพัสดุ</h3>

      <form id="mainForm" onsubmit="handleFormSubmit(event)">
        <input type="hidden" id="recordId">

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">โรงเรียน</label>
            <input type="text" class="form-control" id="school" required placeholder="เช่น รร.ขุนยวม">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">แปลงหมายเลขที่</label>
            <input type="text" class="form-control" id="plotNo" placeholder="เช่น มส.345">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">ลำดับอาคาร</label>
            <input type="text" class="form-control" id="buildingNo">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">สถานะการดำเนินการ</label>
            <select class="form-select" id="status" required>
              <option value="">-- เลือกสถานะ --</option>
              <option value="เสร็จสิ้น">เสร็จสิ้น</option>
              <option value="กำลังดำเนินการ">กำลังดำเนินการ</option>
              <option value="ยังไม่เสร็จ">ยังไม่เสร็จ</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">วันที่แจ้ง/อัปเดต</label>
            <input type="date" class="form-control" id="date"> 
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="btnSave">บันทึกข้อมูล</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">ล้างฟอร์ม (เพิ่มข้อมูลใหม่)</button>
      </form>
    </div>

    <div class="card p-4 mt-4">
      <h4 class="mb-3">รายการข้อมูล (คลิกแก้ไขได้)</h4>
      <div class="table-responsive">
        <table class="table table-bordered table-hover" id="dataTable">
          <thead class="table-dark">
            <tr>
              <th>โรงเรียน</th>
              <th>แปลงหมายเลขที่</th>
              <th>ลำดับอาคาร</th>
              <th>สถานะ</th>
              <th>วันที่</th>
              <th width="10%">จัดการ</th>
            </tr>
          </thead>
          <tbody>
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // 1. โหลดข้อมูลตารางทันทีที่เปิดหน้าเว็บ
    document.addEventListener('DOMContentLoaded', loadData);

    function loadData() {
      // เรียกใช้ฟังก์ชัน getData ใน Code.gs
      google.script.run.withSuccessHandler(renderTable).getData();
    }

    // 2. ฟังก์ชันวาดตาราง
    function renderTable(dataArray) {
      let tbody = document.querySelector("#dataTable tbody");
      tbody.innerHTML = ""; // ล้างข้อมูลเก่า
      
      dataArray.forEach(row => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.school}</td>
          <td>${row.plotNo}</td>
          <td>${row.buildingNo}</td>
          <td><span class="badge ${row.status == 'เสร็จสิ้น' ? 'bg-success' : 'bg-warning text-dark'}">${row.status}</span></td>
          <td>${row.date}</td>
          <td>
            <button class="btn btn-sm btn-info text-white" onclick='editData(${JSON.stringify(row)})'>แก้ไข</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 3. ฟังก์ชันเมื่อกดปุ่มบันทึก
    function handleFormSubmit(e) {
      e.preventDefault(); // ป้องกันเว็บโหลดใหม่
      
      let btn = document.getElementById("btnSave");
      btn.disabled = true;
      btn.innerText = "กำลังบันทึก...";

      // แพ็กข้อมูลจากฟอร์มเป็น Object
      let obj = {
        id: document.getElementById("recordId").value,
        school: document.getElementById("school").value,
        plotNo: document.getElementById("plotNo").value,
        buildingNo: document.getElementById("buildingNo").value,
        status: document.getElementById("status").value,
        date: document.getElementById("date").value
      };

      // ส่งไปที่ Code.gs
      google.script.run.withSuccessHandler(function(response) {
        alert(response); // แจ้งเตือนว่าบันทึกสำเร็จ
        resetForm();     // ล้างฟอร์ม
        loadData();      // โหลดตารางอัปเดตใหม่
      }).saveData(obj);
    }

    // 4. ฟังก์ชันเมื่อกดปุ่ม "แก้ไข" ในตาราง
    function editData(row) {
      // ดึงข้อมูลมายัดใส่ช่อง input ต่างๆ
      document.getElementById("recordId").value = row.id;
      document.getElementById("school").value = row.school;
      document.getElementById("plotNo").value = row.plotNo;
      document.getElementById("buildingNo").value = row.buildingNo;
      document.getElementById("status").value = row.status;
      
      // จัดรูปแบบวันที่ให้รองรับ input type="date" (YYYY-MM-DD)
      let dateVal = "";
      if(row.date){
         // ถ้าในชีตเก็บเป็นแบบอื่น อาจจะต้องเขียนแปลงวันที่ตรงนี้นะครับ
         dateVal = row.date; 
      }
      document.getElementById("date").value = dateVal;

      // เปลี่ยนหน้าตาปุ่มให้รู้ว่ากำลัง "แก้ไข"
      let btn = document.getElementById("btnSave");
      btn.innerText = "อัปเดตข้อมูล";
      btn.classList.replace("btn-primary", "btn-success");
      
      // เลื่อนหน้าจอกลับไปที่ฟอร์มด้านบน
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 5. ฟังก์ชันล้างฟอร์ม
    function resetForm() {
      document.getElementById("mainForm").reset();
      document.getElementById("recordId").value = "";
      
      let btn = document.getElementById("btnSave");
      btn.innerText = "บันทึกข้อมูล";
      btn.classList.replace("btn-success", "btn-primary");
      btn.disabled = false;
    }
  </script>
</body>
</html>
